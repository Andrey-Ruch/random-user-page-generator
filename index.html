<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Random User Page Generator</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main>
            <div class="container">
                <section class="user-info-section">
                    <div class="image-container">
                        <img
                            src="https://randomuser.me/api/portraits/women/14.jpg"
                        />
                    </div>
                    <div class="user-info">
                        <h2 class="full-name">John Doe</h2>
                        <p class="address">Tel Aviv, Israel</p>
                    </div>
                </section>

                <section class="about-section">About me</section>

                <section class="friends-section">Friends</section>

                <section class="favorites-section">Favorites</section>

                <section class="buttons-section">Buttons</section>
            </div>
        </main>
    </body>
</html>
