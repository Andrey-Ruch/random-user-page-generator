<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Random User Page Generator</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main>
            <div class="container">
                <section class="user-info-section">
                    <div class="user-image-container">
                        <img class="user-photo" alt="" />
                    </div>
                    <div class="user-info">
                        <h2 class="full-name"></h2>
                        <p class="address"></p>
                    </div>
                </section>

                <section class="about-section">
                    <h3>About me</h3>
                    <p class="about-text"></p>
                </section>

                <section class="friends-section">
                    <h3>Friends <span class="friends-count"></span></h3>

                    <div class="friends-items-container"></div>
                </section>

                <section class="favorites-section">
                    <h3>Favorites</h3>

                    <div class="favorite-quote">
                        <div class="quote-icon-container">
                            <span class="quote-icon">“</span>
                        </div>

                        <div class="quote-content">
                            <div class="favorite-title">Favorite quote</div>
                            <p class="quote"></p>
                            <p class="quote-author"></p>
                        </div>
                    </div>

                    <hr />

                    <div class="favorite-pokemon">
                        <div class="pokemon-image-container">
                            <img class="pokemon-photo" alt="" />
                        </div>

                        <div class="pokemon-content">
                            <div class="favorite-title">Favorite pokemon</div>
                            <div class="pokemon-name"></div>
                        </div>
                    </div>
                </section>

                <section class="buttons-section">
                    <select
                        class="saved-users-select"
                        aria-label="Select a saved user"
                    >
                        <option value="">No saved users yet</option>
                    </select>
                    <div class="buttons-row">
                        <button class="btn primary generate-btn">
                            Generate user
                        </button>
                        <button class="btn secondary save-btn">
                            Save user page
                        </button>
                        <button class="btn secondary load-btn">
                            Load user page
                        </button>
                    </div>
                </section>
            </div>
        </main>

        <script type="module" src="src/app.js"></script>
    </body>
</html>
